permissions:
  id-token: write
  contents: read

name: Terraform Apply
# only run this workflow on commits to the main branch
on:
  push:
    branches:
      - 'main'
jobs:
  TerraformApply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug OIDC Token Audience
        run: |
          echo "=== OIDC Token Debug ==="
          curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq '.'

      # Authenticate to AWS using OIDC
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          # Specify the IAM role to assume here
          role-to-assume: arn:aws:iam::662829279164:role/GitHubActionsTerraformRole
          aws-region: us-east-1
          audience: "https://github.com"
          mask-aws-account-id: 'true'
          
      # Run Terraform using Hashicorp's setup-terraform Action
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.1.0
          terraform_wrapper: false
      - run:  |
          terraform init
          terraform apply -auto-approve


